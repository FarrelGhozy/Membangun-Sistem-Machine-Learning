name: Preprocessing Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'diabetes_raw/**'
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib seaborn scikit-learn joblib

    - name: Run preprocessing pipeline
      run: |
        python preprocessing/automate_Farrel-Ghozy-Affifudin.py \
          --input diabetes_raw/diabetes_with_headers.csv \
          --output preprocessing/diabetes_preprocessing

    - name: Upload preprocessed dataset as artifact
      uses: actions/upload-artifact@v4
      with:
        name: diabetes_preprocessing
        path: preprocessing/diabetes_preprocessing/

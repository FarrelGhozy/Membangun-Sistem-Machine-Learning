name: CI Workflow - Train Model & Build Docker

on:
  push:
    branches: [ main ]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn mlflow==2.19.0 joblib

    - name: Train model with MLflow
      id: train
      env:
        MLFLOW_ALLOW_FILE_STORE: "true"
      run: |
        cd MLProject
        python modelling.py
        echo "RUN_ID=$(cat run_id.txt)" >> $GITHUB_OUTPUT

    - name: Upload model artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: MLProject/model/

    - name: Upload MLflow runs
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-runs
        path: MLProject/mlruns/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image from MLflow model
      env:
        MLFLOW_ALLOW_FILE_STORE: "true"
      run: |
        cd MLProject
        mlflow models build-docker \
          --model-uri "runs:/${{ steps.train.outputs.RUN_ID }}/model" \
          --name "farrelghozy/diabetes-ci:latest"

    - name: Push Docker image to Docker Hub
      run: |
        docker push farrelghozy/diabetes-ci:latest
